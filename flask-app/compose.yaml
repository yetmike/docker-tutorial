# flask-app/compose.yaml
# Docker Compose Spec (no "version:" key needed)
#
# Two services:
#   web   — our Flask app (built from Dockerfile)
#   redis — official Redis image (no custom Dockerfile needed)
#
# Compose creates a default bridge network; containers reach each other
# by SERVICE NAME as the hostname (e.g. "redis" resolves to the redis container).

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
